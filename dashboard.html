<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    padding: 10px;
}

.container {
    display: flex;
    gap: 10px;
}

.grafico {
    width: 50%;
}

canvas {
    width: 100% !important;
    height: 300px !important;
}
</style>

</head>
<body>

<div class="container">
    <div class="grafico">
        <h3>Gráfico de Linhas</h3>
        <canvas id="linha"></canvas>
    </div>

    <div class="grafico">
        <h3>Gráfico de Barras</h3>
        <canvas id="barra"></canvas>
    </div>
</div>

<script>
const ctx1 = document.getElementById('linha').getContext('2d');
new Chart(ctx1, {
    type: 'line',
    data: {
        labels: ['12:00','13:00','14:00','15:00','16:00','17:00'],
        datasets: [
            {
                label: 'Temperatura',
                data: [30,29,28,25,22,23]
            },
            {
                label: 'Umidade',
                data: [80,82,80,85,80,83]
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});

const ctx2 = document.getElementById('barra').getContext('2d');
new Chart(ctx2, {
    type: 'bar',
    data: {
        labels: ['Janeiro','Fevereiro','Março','Abril','Maio','Junho'],
        datasets: [
            {
                label: 'Temperatura Média',
                data: [22,24,27,23,20,18]
            },
            {
                label: 'Umidade Média',
                data: [90,89,93,87,88,82]
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
</script>

</body>
</html>
